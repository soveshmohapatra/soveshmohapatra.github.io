{% assign page_title = page.title | default: site.title %}
{% assign page_desc = page.description | default: site.description %}
{% assign page_url = site.url | append: page.url %}
{% assign page_image = site.url | append: "/assets/1.jpeg" %}
<meta name="description" content="{{ page_desc }}">
<meta name="author" content="{{ site.full_name | default: site.title }}">
<meta property="og:title" content="{{ page_title | escape }}">
<meta property="og:description" content="{{ page_desc }}">
<meta property="og:url" content="{{ page_url }}">
<meta property="og:image" content="{{ page_image }}">
<meta property="og:image:alt" content="{{ page_title | escape }}">
<meta property="og:type" content="article">
<meta property="og:site_name" content="{{ site.title }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@soveshspeaks">
<meta name="twitter:creator" content="@soveshspeaks">
<meta name="twitter:title" content="{{ page_title | escape }}">
<meta name="twitter:description" content="{{ page_desc }}">
<meta name="twitter:image" content="{{ page_image }}">
<link rel="canonical" href="{{ page_url }}">
<link rel="icon" type="image/jpeg" href="{{ site.baseurl }}/assets/2.jpg">
<link rel="apple-touch-icon" href="{{ site.baseurl }}/assets/2.jpg">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ page_title | escape }}",
  "description": "{{ page_desc }}",
  "url": "{{ page_url }}",
  "image": "{{ page_image }}",
  "author": {
    "@type": "Person",
    "name": "Sovesh Mohapatra",
    "url": "https://soveshmohapatra.com"
  },
  "publisher": {
    "@type": "Person",
    "name": "Sovesh Mohapatra",
    "url": "https://soveshmohapatra.com"
  }
}
</script>
